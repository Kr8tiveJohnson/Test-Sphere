<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test Sphere Lecturer Authentication Portal — Sign in or create your lecturer account.">
    <title>Test Sphere — Lecturer Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: #6c5dd3;
            --brand-dark: #5b4cb8;
            --brand-bg: #f0ebfa;
            --text-dark: #1e1b4b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --input-bg: rgba(240,235,250,.4);
            --amber: #d97706;
            --amber-border: #fcd34d;
            --amber-bg: rgba(251,191,36,.08);
        }

        html { font-size: 16px; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--brand-bg);
            color: #475569;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 1.25rem;
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            animation: pulse-glow 2s infinite ease-in-out;
        }
        .orb-1 { width: clamp(180px,40vw,384px); height: clamp(180px,40vw,384px); background: var(--brand); top: 20%; left: 15%; opacity: .13; }
        .orb-2 { width: clamp(180px,40vw,384px); height: clamp(180px,40vw,384px); background: #c4b5fd; bottom: 20%; right: 15%; opacity: .17; animation-delay: 1s; }
        @keyframes pulse-glow {
            0%,100% { opacity: .1; transform: scale(1); }
            50% { opacity: .25; transform: scale(1.06); }
        }

        /* Layout */
        main {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            padding: .5rem 0 2rem;
        }

        /* Brand Header */
        .brand-header { text-align: center; margin-bottom: 1.5rem; }
        .brand-orbit {
            width: 48px; height: 48px;
            position: relative; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px;
            animation: spin 10s linear infinite;
        }
        .brand-orbit .r1 { position:absolute;inset:0;border-radius:50%;border:1.5px dashed rgba(108,93,211,.35); }
        .brand-orbit .r2 { position:absolute;inset:8px;border-radius:50%;border:1.5px solid var(--brand); }
        .brand-orbit .c  { width:18px;height:18px;background:linear-gradient(135deg,var(--brand-dark),var(--brand));border-radius:50%;box-shadow:0 3px 10px rgba(108,93,211,.35); }
        @keyframes spin { to { transform: rotate(360deg); } }

        .brand-title {
            font-size: clamp(1.2rem,4vw,1.55rem);
            font-weight: 900; color: var(--text-dark); letter-spacing: -.03em;
        }
        .brand-title span { color: var(--brand); }
        .brand-badge {
            font-size: .6rem; font-weight: 700; letter-spacing: .15em;
            text-transform: uppercase; color: var(--text-muted); margin-left: 6px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226,232,240,.8);
            border-radius: 24px;
            padding: clamp(1.25rem, 5vw, 2.25rem);
            box-shadow: 0 20px 60px -15px rgba(108,93,211,.12);
        }

        /* Tab switcher */
        .tab-bar {
            display: flex; background: var(--brand-bg);
            border: 1px solid rgba(226,232,240,.4); border-radius: 14px;
            padding: 5px; position: relative; margin-bottom: 1.75rem;
        }
        .tab-pill {
            position: absolute; top: 5px; bottom: 5px; left: 5px;
            width: calc(50% - 5px); background: white; border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: left .25s cubic-bezier(.4,0,.2,1);
        }
        .tab-btn {
            flex: 1; text-align: center; padding: .7rem .5rem; border-radius: 10px;
            font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
            cursor: pointer; border: none; background: transparent;
            position: relative; z-index: 1; transition: color .2s; color: var(--text-muted);
        }
        .tab-btn.active { color: var(--brand); }

        /* Form */
        .form-heading { margin-bottom: 1.25rem; }
        .form-heading h2 { font-size: clamp(1rem,3.5vw,1.25rem); font-weight: 800; color: var(--text-dark); letter-spacing: -.02em; }
        .form-heading p { font-size: .75rem; color: var(--text-muted); margin-top: 4px; }

        .form-group { margin-bottom: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
        @media (max-width: 400px) { .form-row { grid-template-columns: 1fr; } }

        label {
            display: block; font-size: .65rem; font-weight: 700;
            letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
        }
        label.amber { color: var(--amber); }

        input, select {
            width: 100%; background: var(--input-bg); border: 1.5px solid var(--border);
            border-radius: 12px; padding: .8rem 1rem; font-size: .82rem;
            font-family: 'Inter', sans-serif; font-weight: 500; color: var(--text-dark);
            outline: none; transition: border-color .2s, background .2s, box-shadow .2s;
            appearance: none; -webkit-appearance: none;
        }
        input::placeholder { color: #cbd5e1; }
        input:focus, select:focus {
            border-color: var(--brand); background: white;
            box-shadow: 0 0 0 4px rgba(108,93,211,.07);
        }
        input.amber-input { background: var(--amber-bg); border-color: var(--amber-border); color: #78350f; }
        input.amber-input:focus { border-color: var(--amber); box-shadow: 0 0 0 4px rgba(217,119,6,.07); }
        input.amber-input::placeholder { color: #d97706; opacity: .5; }

        /* Inline input+button */
        .input-inline { display: flex; gap: .5rem; }
        .input-inline input { flex: 1; min-width: 0; }
        .btn-gen {
            flex-shrink: 0; background: var(--brand-bg); border: 1.5px solid rgba(108,93,211,.2);
            color: var(--brand); border-radius: 12px; padding: 0 .9rem;
            font-size: .72rem; font-weight: 700; cursor: pointer;
            transition: background .2s; white-space: nowrap;
        }
        .btn-gen:hover { background: rgba(108,93,211,.1); }

        .btn-primary {
            width: 100%; background: var(--brand); color: white; border: none;
            border-radius: 12px; padding: .95rem 1rem; font-size: .78rem; font-weight: 800;
            letter-spacing: .08em; text-transform: uppercase; cursor: pointer; margin-top: .75rem;
            transition: background .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 6px 20px rgba(108,93,211,.25);
        }
        .btn-primary:hover { background: var(--brand-dark); box-shadow: 0 8px 24px rgba(108,93,211,.35); }
        .btn-primary:active { transform: scale(.99); }

        .switch-role { text-align: center; margin-top: 1.25rem; }
        .switch-role a { font-size: .75rem; font-weight: 700; color: var(--brand); text-decoration: none; }
        .switch-role a:hover { text-decoration: underline; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main id="auth-container">

        <!-- Brand Header -->
        <div class="brand-header">
            <div class="brand-orbit" aria-hidden="true">
                <div class="r1"></div>
                <div class="r2"></div>
                <div class="c"></div>
            </div>
            <h1 class="brand-title">Test<span>Sphere</span><span class="brand-badge">Lecturer</span></h1>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- Tab bar -->
            <div class="tab-bar" role="tablist" aria-label="Authentication mode">
                <div class="tab-pill" id="tab-pill"></div>
                <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" aria-controls="login-view">Sign In</button>
                <button class="tab-btn"        id="tab-signup" role="tab" aria-selected="false" aria-controls="signup-view">Create Account</button>
            </div>

            <!-- LOGIN VIEW -->
            <div id="login-view" role="tabpanel" aria-labelledby="tab-login">
                <div class="form-heading">
                    <h2>Welcome Back, Lecturer</h2>
                    <p>Verify your credentials to access your Dashboard.</p>
                </div>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" required placeholder="lecturer@sphere.edu" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary">Enter Dashboard</button>
                </form>
                <div class="switch-role">
                    <a href="login.html">Are you a Student? Login here</a>
                </div>
            </div>

            <!-- SIGNUP VIEW -->
            <div id="signup-view" class="hidden" role="tabpanel" aria-labelledby="tab-signup">
                <div class="form-heading">
                    <h2>Set Up Lecturer Account</h2>
                    <p>Secure access for staff and faculty members.</p>
                </div>
                <form id="signup-form" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-name">Full Name</label>
                            <input type="text" id="signup-name" required placeholder="Prof. Jane Doe" autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="institution-field">Institution</label>
                            <input type="text" id="institution-field" required placeholder="Test Sphere University">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" required placeholder="faculty@sphere.edu" autocomplete="email">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="staff-field">Staff ID Code</label>
                            <div class="input-inline">
                                <input type="text" id="staff-field" required placeholder="STF-XXXX">
                                <button type="button" id="generate-code-btn" class="btn-gen">Generate</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="token-field" class="amber">Dept. Registration Key</label>
                            <input type="text" id="token-field" required placeholder="Ask Admin for Key" class="amber-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signup-password">Choose Password</label>
                            <input type="password" id="signup-password" required placeholder="••••••••" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="signup-password-confirm">Confirm Password</label>
                            <input type="password" id="signup-password-confirm" required placeholder="••••••••" autocomplete="new-password">
                        </div>
                    </div>
                    <button type="submit" id="submit-signup-btn" class="btn-primary">Complete Registration</button>
                </form>
                <div class="switch-role">
                    <a href="login.html">Are you a Student? Register here</a>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabLogin  = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');
            const loginView  = document.getElementById('login-view');
            const signupView = document.getElementById('signup-view');
            const pill = document.getElementById('tab-pill');

            function showLogin() {
                loginView.classList.remove('hidden');
                signupView.classList.add('hidden');
                pill.style.left = '5px';
                tabLogin.classList.add('active');   tabLogin.setAttribute('aria-selected','true');
                tabSignup.classList.remove('active'); tabSignup.setAttribute('aria-selected','false');
            }
            function showSignup() {
                signupView.classList.remove('hidden');
                loginView.classList.add('hidden');
                pill.style.left = 'calc(50% + 0px)';
                tabSignup.classList.add('active');  tabSignup.setAttribute('aria-selected','true');
                tabLogin.classList.remove('active'); tabLogin.setAttribute('aria-selected','false');
            }

            tabLogin.addEventListener('click', showLogin);
            tabSignup.addEventListener('click', showSignup);

            document.getElementById('generate-code-btn').addEventListener('click', () => {
                document.getElementById('staff-field').value = `STF-${Math.floor(1000 + Math.random() * 9000)}`;
            });

            // Login submit
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email    = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                try {
                    const res  = await fetch('http://127.0.0.1:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (data.token) {
                        alert('Authentication successful!');
                        if (data.user.role === 'admin')    window.location.href = 'http://127.0.0.1:5000/admin/dashboard';
                        else if (data.user.role === 'lecturer') window.location.href = 'http://127.0.0.1:5000/lecturer/builder';
                        else window.location.href = 'http://127.0.0.1:5000/student/portal';
                    } else {
                        alert(data.message || 'Authentication failed.');
                    }
                } catch {
                    alert('Unable to reach authentication server.');
                }
            });

            // Signup submit
            document.getElementById('signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const password = document.getElementById('signup-password').value;
                if (password !== document.getElementById('signup-password-confirm').value) {
                    return alert('Passwords do not match!');
                }
                const payload = {
                    name:        document.getElementById('signup-name').value,
                    institution: document.getElementById('institution-field').value,
                    email:       document.getElementById('signup-email').value,
                    role: 'lecturer',
                    password,
                    staffId:   document.getElementById('staff-field').value,
                    deptToken: document.getElementById('token-field').value
                };
                const res  = await fetch('http://127.0.0.1:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    alert('Lecturer account setup complete!');
                    showLogin();
                    document.getElementById('signup-form').reset();
                } else {
                    alert(data.message || data.error || 'Registration failed.');
                }
            });
        });
    </script>
</body>
</html>
